<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helm Market Pro</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0 }

/* HEADER */
header {
  background:#42b549;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* GRID */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}
.card img { width:100%; height:200px; object-fit:cover }
.card:hover { transform:translateY(-5px); }

/* DETAIL PAGE */
.detail {
  display:none;
  padding:20px;
}

.detail-container {
  display:flex;
  gap:20px;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

/* IMAGE */
.img-box {
  width:400px;
}

.main-img {
  width:100%;
  height:400px;
  object-fit:cover;
}

/* THUMB */
.thumb {
  display:flex;
  gap:10px;
  margin-top:10px;
}
.thumb img {
  width:60px;
  height:60px;
  cursor:pointer;
}

/* VARIANT */
.variant {
  padding:6px 12px;
  border:1px solid #ddd;
  margin:5px;
  display:inline-block;
  cursor:pointer;
}
.variant.active {
  border:2px solid #42b549;
}

/* BUTTON */
.btn {
  background:#ee4d2d;
  color:#fff;
  padding:12px;
  border:none;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

/* QTY */
.qty {
  display:flex;
  gap:10px;
  align-items:center;
}
.qty button { width:30px }

</style>
</head>

<body>

<header>
  <h2>🛍️ Helm Market</h2>
  <div onclick="openCart()">🛒 Cart (<span id="cartCount">0</span>)</div>
</header>

<!-- LIST -->
<div id="listPage" class="products"></div>

<!-- DETAIL -->
<div id="detailPage" class="detail"></div>

<script>
const API = "https://raw.githubusercontent.com/namecheapel-boop/frontend-akses/main/data/products.json";

let products = [];
let selected = null;
let qty = 1;
let selectedVariant = null;

// LOAD
async function load(){
  const res = await fetch(API);
  const data = await res.json();
  products = data.products;
  renderList();
}
load();

// LIST
function renderList(){
  const el = document.getElementById("listPage");
  el.innerHTML = products.map(p=>`
    <div class="card" onclick="openDetail(${p.id})">
      <img src="${p.variants[0].image}">
      <div style="padding:10px">
        <div>${p.name}</div>
        <b>Rp ${p.price.toLocaleString()}</b>
      </div>
    </div>
  `).join('');
}

// DETAIL
function openDetail(id){
  selected = products.find(x=>x.id==id);
  qty = 1;
  selectedVariant = selected.variants[0];

  document.getElementById("listPage").style.display="none";
  const el = document.getElementById("detailPage");
  el.style.display="block";

  el.innerHTML = `
    <button onclick="back()">← Kembali</button>

    <div class="detail-container">

      <div class="img-box">
        <img id="mainImg" class="main-img" src="${selectedVariant.image}">
        <div class="thumb">
          ${selected.variants.map(v=>`
            <img src="${v.image}" onclick="changeImg('${v.image}')">
          `).join('')}
        </div>
      </div>

      <div style="flex:1">
        <h2>${selected.name}</h2>
        <h3>Rp ${selected.price.toLocaleString()}</h3>

        <p>${selected.description}</p>

        <h4>Warna</h4>
        ${selected.variants.map(v=>`
          <span class="variant" onclick="selectVariant('${v.color}','${v.image}')">${v.color}</span>
        `).join('')}

        <h4>Jumlah</h4>
        <div class="qty">
          <button onclick="qty-- ; updateQty()">-</button>
          <span id="qty">${qty}</span>
          <button onclick="qty++ ; updateQty()">+</button>
        </div>

        <h3>Total: Rp <span id="total">${selected.price}</span></h3>

        <button class="btn" onclick="addCart()">+ Keranjang</button>
        <button class="btn" style="background:#42b549" onclick="checkout()">⚡ Beli Sekarang</button>
      </div>

    </div>
  `;
}

// IMAGE CHANGE
function changeImg(src){
  document.getElementById("mainImg").src = src;
}

// VARIANT
function selectVariant(color, img){
  selectedVariant = {color, image:img};
  changeImg(img);

  document.querySelectorAll(".variant").forEach(v=>v.classList.remove("active"));
  event.target.classList.add("active");
}

// QTY
function updateQty(){
  if(qty<1) qty=1;
  document.getElementById("qty").innerText = qty;
  document.getElementById("total").innerText = (selected.price*qty).toLocaleString();
}

// CART
function addCart(){
  let cart = JSON.parse(localStorage.getItem("cart")||"[]");

  cart.push({
    id:selected.id,
    name:selected.name,
    price:selected.price,
    qty,
    variant:selectedVariant
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert("Masuk keranjang!");
}

// COUNT
function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem("cart")||"[]");
  document.getElementById("cartCount").innerText = cart.length;
}
updateCartCount();

// CHECKOUT
function checkout(){
  alert("🚀 Integrasi ke API kamu di sini");
}

// BACK
function back(){
  document.getElementById("detailPage").style.display="none";
  document.getElementById("listPage").style.display="grid";
}

</script>

</body>
</html>
