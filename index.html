<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helm Market Pro</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0 }

/* HEADER */
header {
  background:#42b549;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* GRID */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}
.card img { width:100%; height:200px; object-fit:cover }
.card:hover { transform:translateY(-5px); }

/* DETAIL PAGE */
.detail {
  display:none;
  padding:20px;
}

.detail-container {
  display:flex;
  gap:20px;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

/* IMAGE */
.img-box {
  width:400px;
}

.main-img {
  width:100%;
  height:400px;
  object-fit:cover;
}

/* THUMB */
.thumb {
  display:flex;
  gap:10px;
  margin-top:10px;
}
.thumb img {
  width:60px;
  height:60px;
  cursor:pointer;
}

/* VARIANT */
.variant {
  padding:6px 12px;
  border:1px solid #ddd;
  margin:5px;
  display:inline-block;
  cursor:pointer;
}
.variant.active {
  border:2px solid #42b549;
}

/* BUTTON */
.btn {
  background:#ee4d2d;
  color:#fff;
  padding:12px;
  border:none;
  width:100%;
  margin-top:10px;
  cursor:pointer;
  border-radius:5px;
  font-weight:bold;
}

.btn-green {
  background:#42b549;
}

/* QTY */
.qty {
  display:flex;
  gap:10px;
  align-items:center;
}
.qty button { width:30px; cursor:pointer; }

/* MODAL FORM */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:1000;
  justify-content:center;
  align-items:center;
}
.modal-content {
  background:#fff;
  width:90%;
  max-width:500px;
  border-radius:10px;
  padding:20px;
  max-height:90%;
  overflow-y:auto;
}
.modal-content h3 {
  margin-top:0;
  color:#333;
}
.modal-content label {
  display:block;
  margin:10px 0 5px;
  font-weight:bold;
}
.modal-content input, .modal-content select, .modal-content textarea {
  width:100%;
  padding:10px;
  border:1px solid #ddd;
  border-radius:5px;
  box-sizing:border-box;
}
.modal-content textarea {
  resize:vertical;
}
.bank-details {
  background:#f0f0f0;
  padding:10px;
  border-radius:5px;
  margin:10px 0;
  font-size:14px;
}
.total-price {
  font-size:20px;
  font-weight:bold;
  color:#ee4d2d;
  margin:15px 0;
  text-align:center;
}
.btn-checkout {
  background:#42b549;
  color:#fff;
  padding:12px;
  border:none;
  width:100%;
  border-radius:5px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.btn-checkout:hover {
  background:#368f3d;
}
.close-modal {
  float:right;
  font-size:24px;
  cursor:pointer;
  color:#999;
}
</style>
</head>

<body>

<header>
  <h2>🛍️ Helm Market</h2>
  <div onclick="openCart()">🛒 Cart (<span id="cartCount">0</span>)</div>
</header>

<!-- LIST -->
<div id="listPage" class="products"></div>

<!-- DETAIL -->
<div id="detailPage" class="detail"></div>

<!-- MODAL FORM CHECKOUT -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h3>📋 Form Pemesanan</h3>
    
    <label>👤 Nama Lengkap:</label>
    <input type="text" id="customerName" required placeholder="Masukkan nama lengkap Anda">
    
    <label>📧 Email:</label>
    <input type="email" id="customerEmail" required placeholder="contoh@email.com">
    
    <label>📞 No. Telepon:</label>
    <input type="tel" id="customerPhone" required placeholder="0812xxxxxx">
    
    <label>🏠 Alamat Pengiriman:</label>
    <textarea id="shippingAddress" required rows="3" placeholder="Jl. Contoh No. 123, RT/RW, Kelurahan, Kecamatan, Kota, Kode Pos"></textarea>
    
    <label>🏦 Metode Pembayaran:</label>
    <select id="paymentMethod" onchange="updateBankDetails()">
      <option value="BCA">🏦 BCA - Transfer Bank</option>
      <option value="Mandiri">🏦 Mandiri - Transfer Bank</option>
      <option value="BRI">🏦 BRI - Transfer Bank</option>
    </select>
    
    <div id="bankDetails" class="bank-details"></div>
    
    <div class="total-price">
      💰 Total: Rp <span id="totalAmount">0</span>
    </div>
    
    <button type="button" class="btn-checkout" onclick="sendToWhatsApp()">✅ Kirim ke WhatsApp</button>
  </div>
</div>

<script>
const API = "https://raw.githubusercontent.com/namecheapel-boop/frontend-akses/main/data/products.json";
const NOMOR_ADMIN = "6281234567890"; // GANTI DENGAN NOMOR WHATSAPP ADMIN

let products = [];
let selected = null;
let qty = 1;
let selectedVariant = null;

// LOAD
async function load(){
  const res = await fetch(API);
  const data = await res.json();
  products = data.products;
  renderList();
}
load();

// LIST
function renderList(){
  const el = document.getElementById("listPage");
  el.innerHTML = products.map(p=>`
    <div class="card" onclick="openDetail(${p.id})">
      <img src="${p.variants[0].image}">
      <div style="padding:10px">
        <div>${p.name}</div>
        <b>Rp ${p.price.toLocaleString()}</b>
      </div>
    </div>
  `).join('');
}

// DETAIL
function openDetail(id){
  selected = products.find(x=>x.id==id);
  qty = 1;
  selectedVariant = selected.variants[0];

  document.getElementById("listPage").style.display="none";
  const el = document.getElementById("detailPage");
  el.style.display="block";

  el.innerHTML = `
    <button onclick="back()" style="margin-bottom:10px; cursor:pointer;">← Kembali</button>

    <div class="detail-container">

      <div class="img-box">
        <img id="mainImg" class="main-img" src="${selectedVariant.image}">
        <div class="thumb">
          ${selected.variants.map(v=>`
            <img src="${v.image}" onclick="changeImg('${v.image}')">
          `).join('')}
        </div>
      </div>

      <div style="flex:1">
        <h2>${selected.name}</h2>
        <h3 style="color:#ee4d2d">Rp ${selected.price.toLocaleString()}</h3>

        <p>${selected.description || "Helm berkualitas tinggi dengan desain modern dan nyaman digunakan."}</p>

        <h4>🎨 Pilih Warna</h4>
        ${selected.variants.map((v,idx)=>`
          <span class="variant ${idx===0?'active':''}" onclick="selectVariant('${v.color}','${v.image}', this)">${v.color}</span>
        `).join('')}

        <h4>🔢 Jumlah</h4>
        <div class="qty">
          <button onclick="changeQty(-1)">-</button>
          <span id="qtyDisplay">${qty}</span>
          <button onclick="changeQty(1)">+</button>
        </div>

        <h3>💰 Total: Rp <span id="totalDisplay">${selected.price.toLocaleString()}</span></h3>

        <button class="btn" onclick="addCart()">+ Keranjang</button>
        <button class="btn btn-green" onclick="openCheckoutModal()">🛒 Beli Sekarang</button>
      </div>

    </div>
  `;
}

function changeImg(src){
  document.getElementById("mainImg").src = src;
}

function selectVariant(color, img, element){
  selectedVariant = {color, image:img};
  changeImg(img);
  document.querySelectorAll(".variant").forEach(v=>v.classList.remove("active"));
  element.classList.add("active");
  updateTotalDisplay();
}

function changeQty(delta){
  let newQty = qty + delta;
  if(newQty >= 1){
    qty = newQty;
    updateTotalDisplay();
  }
}

function updateTotalDisplay(){
  document.getElementById("qtyDisplay").innerText = qty;
  const total = selected.price * qty;
  document.getElementById("totalDisplay").innerText = total.toLocaleString();
}

function back(){
  document.getElementById("detailPage").style.display="none";
  document.getElementById("listPage").style.display="grid";
}

function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem("cart")||"[]");
  document.getElementById("cartCount").innerText = cart.length;
}
updateCartCount();

function addCart(){
  alert("✅ Ditambahkan ke keranjang!");
  let cart = JSON.parse(localStorage.getItem("cart")||"[]");
  cart.push({
    id: selected.id,
    name: selected.name,
    variant: selectedVariant?.color,
    price: selected.price,
    qty: qty
  });
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
}

function openCart(){
  let cart = JSON.parse(localStorage.getItem("cart")||"[]");
  if(cart.length===0){
    alert("Keranjang kosong");
    return;
  }
  let msg = "🛒 *KERANJANG BELANJA*\n\n";
  let total = 0;
  cart.forEach((item,idx)=>{
    let subtotal = item.price * item.qty;
    total += subtotal;
    msg += `${idx+1}. ${item.name} - ${item.variant}\n   ${item.qty} x Rp ${item.price.toLocaleString()} = Rp ${subtotal.toLocaleString()}\n\n`;
  });
  msg += `*TOTAL: Rp ${total.toLocaleString()}*`;
  alert(msg);
}

// ========== MODAL CHECKOUT ==========
function openCheckoutModal(){
  if(!selected){
    alert("Pilih produk terlebih dahulu!");
    return;
  }
  
  // Reset form
  document.getElementById("customerName").value = "";
  document.getElementById("customerEmail").value = "";
  document.getElementById("customerPhone").value = "";
  document.getElementById("shippingAddress").value = "";
  
  // Update total
  const total = selected.price * qty;
  document.getElementById("totalAmount").innerText = total.toLocaleString();
  
  // Tampilkan bank details default
  updateBankDetails();
  
  // Tampilkan modal
  document.getElementById("checkoutModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("checkoutModal").style.display = "none";
}

function updateBankDetails(){
  const method = document.getElementById("paymentMethod").value;
  let details = "";
  if(method === "BCA"){
    details = "🏦 *Bank BCA*\nNo. Rekening: 1234567890\nAtas Nama: Helm Market Pro";
  } else if(method === "Mandiri"){
    details = "🏦 *Bank Mandiri*\nNo. Rekening: 0987654321\nAtas Nama: Helm Market Pro";
  } else if(method === "BRI"){
    details = "🏦 *Bank BRI*\nNo. Rekening: 1122334455\nAtas Nama: Helm Market Pro";
  }
  document.getElementById("bankDetails").innerHTML = details.replace(/\n/g, "<br>");
}

function sendToWhatsApp(){
  // Validasi form
  const name = document.getElementById("customerName").value.trim();
  const email = document.getElementById("customerEmail").value.trim();
  const phone = document.getElementById("customerPhone").value.trim();
  const address = document.getElementById("shippingAddress").value.trim();
  const paymentMethod = document.getElementById("paymentMethod").value;
  
  if(!name){
    alert("❌ Nama lengkap harus diisi!");
    return;
  }
  if(!email){
    alert("❌ Email harus diisi!");
    return;
  }
  if(!phone){
    alert("❌ No. Telepon harus diisi!");
    return;
  }
  if(!address){
    alert("❌ Alamat pengiriman harus diisi!");
    return;
  }
  
  const total = selected.price * qty;
  
  // Format pesan WhatsApp
  let pesan = `*🛍️ ORDER BARU - HELM MARKET PRO*\n\n`;
  pesan += `*DATA PELANGGAN*\n`;
  pesan += `👤 Nama: ${name}\n`;
  pesan += `📧 Email: ${email}\n`;
  pesan += `📞 Telepon: ${phone}\n`;
  pesan += `🏠 Alamat: ${address}\n\n`;
  pesan += `*DETAIL PESANAN*\n`;
  pesan += `📦 Produk: ${selected.name}\n`;
  pesan += `🎨 Warna: ${selectedVariant?.color || '-'}\n`;
  pesan += `🔢 Jumlah: ${qty}\n`;
  pesan += `💰 Total: Rp ${total.toLocaleString()}\n\n`;
  pesan += `*PEMBAYARAN*\n`;
  pesan += `🏦 Metode: ${paymentMethod} - Transfer Bank\n\n`;
  pesan += `📌 *Mohon konfirmasi pembayaran setelah transfer.*\n`;
  pesan += `Terima kasih! 🙏`;
  
  // Kirim ke WhatsApp
  const url = `https://wa.me/${NOMOR_ADMIN}?text=${encodeURIComponent(pesan)}`;
  window.open(url, '_blank');
  
  // Tutup modal
  closeModal();
  
  // Optional: reset form dan kembali ke halaman utama
  alert("✅ Pesanan akan dikirim ke admin via WhatsApp. Silakan lanjutkan pembayaran.");
}

// Tutup modal jika klik di luar
window.onclick = function(event) {
  const modal = document.getElementById("checkoutModal");
  if (event.target === modal) {
    closeModal();
  }
}
</script>

</body>
</html>
